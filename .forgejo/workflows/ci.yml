# Note: We use --silent argument on yarn invocations to keep the output simple
# and readable through email notifications.
name: CI

on:
  push:
    branches:
      - main
  pull_request:

# Cancel superseded runs on the same ref so we don't waste CI minutes building
# commits that are no longer the head of a branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Change pip's cache directory to be inside the project directory since we can
  # only cache local items.
  PIP_CACHE_DIR: '${{ github.workspace }}/.cache/pip'
  APT_CACHE_DIR: '${{ github.workspace }}/apt-cache'

jobs:
  jslint:
    name: JS code lint
    runs-on: node-lts
    container:
      image: node:24.15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache yarn dependencies
        uses: actions/cache@v4
        with:
          path: |
            .yarn-cache
            node_modules
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: JS code lint
        run: yarn run --silent ci:lint-full


  build:
    name: Build and lint
    runs-on: node-lts
    container:
      image: node:24.15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache yarn dependencies
        uses: actions/cache@v4
        with:
          path: |
            .yarn-cache
            node_modules
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Client TS code check
        run: yarn run ci:ts-client

      # Domain specific checks.
      - name: Check banks
        run: yarn run --silent ci:banks

      - name: Check locales
        run: yarn run --silent ci:locales

      - name: Check config
        run: yarn run --silent ci:config

      # Build the server and client code in development and production.
      - name: Build server and client
        run: yarn run --silent build:ci

  python:
    name: Python tests
    runs-on: node-lts
    container:
      image: node:24.15
    env:
      APT_CACHE_DIR: '${{ github.workspace }}/.apt-cache-python'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache yarn dependencies
        uses: actions/cache@v4
        with:
          path: |
            .yarn-cache
            node_modules
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-

      # Only this job installs Python/woob, so the pip cache is scoped here and
      # never clobbered by the other jobs. The key is intentionally NOT suffixed
      # with github.sha (there is no requirements*.txt to hash) so the cache is
      # reused across commits instead of being invalidated every time.
      - name: Cache pip, venv and woob
        uses: actions/cache@v4
        with:
          path: |
            .cache/pip
            venv
            .woob
          key: pip-python
          restore-keys: |
            pip-

      # apt package downloads are cached in a job-specific directory so the
      # python and tests jobs don't share (and clobber) each other's cache.
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: ${{ env.APT_CACHE_DIR }}
          key: apt-python
          restore-keys: |
            apt-

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Install Python and Woob
        run: |
          # Install some python dependencies for woob.
          mkdir -p "$APT_CACHE_DIR"
          apt-get update
          apt-get install -o dir::cache::archives="$APT_CACHE_DIR" -y python3-virtualenv python3-lxml python3-dev python3-yaml locales
          update-alternatives --install /usr/bin/python python $(which python3) 1

          # Reuse the cached virtualenv when present; only (re)create it on a cache miss.
          if [ ! -d venv ]; then
            python -m virtualenv -p /usr/bin/python3 venv
          fi

          # Generate EN locale to avoid exceptions like "Unknown exception raised: 'ascii' codec can't decode byte".
          echo "en_US UTF-8" > /etc/locale.gen
          locale-gen C.UTF-8 && update-locale C.UTF-8

          . venv/bin/activate
          pip3 install --upgrade requests black

          # Install woob into a separate target directory (NOT the virtualenv), so
          # the test runner's Python stays woob-free and the "woob not installed"
          # detection in tests/server/woob.js still passes. KRESUS_WOOB_DIR points
          # at this directory. Skip the (slow) install on a cache hit.
          mkdir -p .woob
          if [ ! -e .woob/woob ]; then
            pip3 install woob -t .woob
          fi

      - name: Lint Python code
        run: |
          . venv/bin/activate
          yarn run --silent ci:python

      - name: Run test suite with woob
        env:
          LANG: en_US.UTF-8
          LANGUAGE: en_US:en
          LC_ALL: en_US.UTF-8
          KRESUS_WOOB_DIR: .woob
        run: |
          . venv/bin/activate
          yarn run --silent ci:test -- ./tests/server/woob.js

  tests:
    name: JS tests
    runs-on: node-lts
    container:
      image: node:24.15
    env:
      APT_CACHE_DIR: '${{ github.workspace }}/.apt-cache-tests'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache yarn dependencies
        uses: actions/cache@v4
        with:
          path: |
            .yarn-cache
            node_modules
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Run test suite without woob
        run: |
          yarn run --silent ci:test
